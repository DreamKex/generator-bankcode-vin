<!DOCTYPE html>
<html>
<head>
    <title>My Web Site</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-size: 1rem;
        }
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        li {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid #ccc;
            flex-wrap: wrap;
        }
        span {
            font-size: 1rem;
        }
        .copy-btn {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 1rem;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 1rem;
            margin: 0.5rem;
            cursor: pointer;
        }
        @media screen and (max-width: 767px) {
            body {
                font-size: 0.8rem;
            }
            span {
                font-size: 0.8rem;
            }
            .copy-btn {
                font-size: 0.8rem;
                padding: 0.5rem;
                margin: 0.3rem;
            }
        }
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 2px;
            padding: 16px;
            position: fixed;
            z-index: 1;
            left: 50%;
            top: 30px;
            transform: translateX(-50%);
            font-size: 17px;
            opacity: 1;
            transition: opacity 0.5s, visibility 0.5s;
        }
        #toast.show {
            visibility: visible;
            opacity: 1;
        }
        #toast.success {
            background-color: #4CAF50;
        }
        #toast.error {
            background-color: #f44336;
        }
    </style>
</head>
<body>
    <h1>银行卡号-车架号 生成器</h1>
    <form method="get" action="" id="bankForm">
        <select name="card_prefix" id="bankSelect" data-toast-duration="{{ toast_duration }}">
            {% for item in bank_list %}
            <option value="{{ item.card_prefix }}" {% if item.card_prefix == card_prefix %}selected="selected" {% endif %}>{{ item.card_name }}</option>
            {% endfor %}
        </select>
    </form>
    <div id="toast"></div>
    <ul>
        {% for item in result %}
        <li>
            <span>{{ item.card_num }}</span>
            <span>-</span>
            <span>{{ item.vin }}</span>
            <button class="copy-card-num-btn copy-btn" data-text="{{ item.card_num }}">复制卡号</button>
            <button class="copy-vin-btn copy-btn" data-text="{{ item.vin }}">复制车架号</button>
        </li>
        {% endfor %}
    </ul>
    <script>
        document.getElementById('bankSelect').addEventListener('change', function() {
            document.getElementById('bankForm').submit();
        });

        var toast = document.getElementById("toast");
        var toastTimeout;

        function showToast(message, isSuccess) {
            if (toastTimeout) {
                clearTimeout(toastTimeout);
            }
            toast.textContent = message;
            toast.className = isSuccess ? "show success" : "show error";
            var duration = parseInt(document.getElementById('bankSelect').dataset.toastDuration) * 1000;
            toastTimeout = setTimeout(function() {
                toast.className = toast.className.replace("show", "").trim();
            }, duration);
        }

        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                showToast("已复制到剪贴板！", true);
            } catch (err) {
                var input = document.createElement("textarea");
                input.value = text;
                document.body.appendChild(input);
                input.select();
                try {
                    document.execCommand("Copy");
                    showToast("已复制到剪贴板！", true);
                } catch(e) {
                    showToast("复制失败！", false);
                }
                input.remove();
            }
        }

        document.querySelectorAll('.copy-btn').forEach(function(button) {
            button.addEventListener('click', function() {
                copyToClipboard(this.dataset.text);
            });
        });
    </script>
</body>
</html>
